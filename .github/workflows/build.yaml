name: Build & Push image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Only GitHub-authored actions are used (actions/*); the runner's
      # preinstalled Docker handles build/login/push via plain shell so we
      # don't depend on third-party (docker/*) actions being downloadable.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push image
        env:
          REGISTRY: ghcr.io
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image="$REGISTRY/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          short_sha="${SHA::7}"
          stamp="$(date -u +%Y%m%d-%H%M%S)"

          echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin

          docker build \
            -t "$image:latest" \
            -t "$image:$short_sha" \
            -t "$image:$stamp" \
            .

          docker push "$image:latest"
          docker push "$image:$short_sha"
          docker push "$image:$stamp"
